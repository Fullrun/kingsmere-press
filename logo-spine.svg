<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C0C0"/>
      <stop offset="50%" style="stop-color:#E8E8E8"/>
      <stop offset="100%" style="stop-color:#A8A8A8"/>
    </linearGradient>
    <linearGradient id="dg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A2A"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
  </defs>

  <!-- Crown (simplified) -->
  <g transform="translate(60, 18)">
    <rect x="-18" y="4" width="36" height="7" rx="1.5" fill="url(#sg)" stroke="#888" stroke-width="0.8"/>
    <polygon points="-18,4 -14,4 -16,-4" fill="url(#sg)" stroke="#888" stroke-width="0.6"/>
    <polygon points="-4,4 4,4 0,-10" fill="url(#sg)" stroke="#888" stroke-width="0.6"/>
    <polygon points="14,4 18,4 16,-4" fill="url(#sg)" stroke="#888" stroke-width="0.6"/>
    <circle cx="-16" cy="-4.5" r="1.8" fill="url(#sg)" stroke="#888" stroke-width="0.5"/>
    <circle cx="0" cy="-10.5" r="2" fill="url(#sg)" stroke="#888" stroke-width="0.5"/>
    <circle cx="16" cy="-4.5" r="1.8" fill="url(#sg)" stroke="#888" stroke-width="0.5"/>
  </g>

  <!-- Shield -->
  <path d="M 60 28 L 100 38 L 100 90 Q 100 120 60 132 Q 20 120 20 90 L 20 38 Z"
        fill="url(#dg)" stroke="url(#sg)" stroke-width="1.8"/>

  <!-- Bridge arch -->
  <g transform="translate(60, 82)">
    <path d="M -25 14 Q -25 -20 0 -20 Q 25 -20 25 14" fill="none" stroke="url(#sg)" stroke-width="1.8"/>
    <line x1="-28" y1="14" x2="28" y2="14" stroke="url(#sg)" stroke-width="1.8"/>
    <line x1="-25" y1="14" x2="-25" y2="22" stroke="url(#sg)" stroke-width="1.5"/>
    <line x1="25" y1="14" x2="25" y2="22" stroke="url(#sg)" stroke-width="1.5"/>
    <line x1="-28" y1="22" x2="28" y2="22" stroke="url(#sg)" stroke-width="1.5"/>
  </g>

  <!-- KP -->
  <text x="60" y="68" text-anchor="middle" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
        font-size="18" font-weight="bold" fill="url(#sg)" letter-spacing="3">KP</text>

  <!-- Small text below -->
  <text x="60" y="152" text-anchor="middle" font-family="'Palatino Linotype', Georgia, serif"
        font-size="7" fill="#999" letter-spacing="2">KINGSMERE</text>
</svg>